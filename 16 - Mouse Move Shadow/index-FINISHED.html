<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mouse Shadow</title>
  <link rel="icon" href="https://fav.farm/✅" />
  <style>
    *, *::before, *::after { cursor: none !important; }

    #cursor, #trail {
      position: fixed;
      top: 0; left: 0;
      border-radius: 50%;
      pointer-events: none;
      will-change: transform;
    }

    #cursor {
      width: 26px; height: 26px;
      margin: -13px 0 0 -13px;
      background: rgba(255, 0, 180, 0.95);
      box-shadow: 0 0 12px 5px rgba(255, 0, 180, 0.95), 0 0 32px 10px rgba(255,0,180,0.4);
      transition: width .2s, height .2s, margin .2s, background .2s, box-shadow .2s;
      z-index: 9999;
    }

    #trail {
      width: 60px; height: 60px;
      margin: -30px 0 0 -30px;
      background: rgba(255,0,180,0.08);
      box-shadow: 0 0 30px 14px rgba(255,0,180,0.15);
      transition: width .2s, height .2s, margin .2s, background .2s, box-shadow .2s;
      z-index: 9998;
    }

    #cursor.hovered {
      width: 44px; height: 44px;
      margin: -22px 0 0 -22px;
      background: rgba(238, 7, 11, 0.95);
      box-shadow: 0 0 16px 7px rgba(238, 7, 11, 0.95), 0 0 52px 18px rgba(0,255,140,0.4);
    }

    #trail.hovered {
      width: 88px; height: 88px;
      margin: -44px 0 0 -44px;
      background: rgba(0,255,140,0.08);
      box-shadow: 0 0 44px 22px rgba(0,255,140,0.18);
    }
  </style>
</head>
<body>

  <div id="cursor"></div>
  <div id="trail"></div>

  <div class="hero">
    <h1 contenteditable>🔥WOAH!</h1>
  </div>

  <style>
  html {
    color: black;
    font-family: sans-serif;
  }

  body {
    margin: 0;
    background: #0d0d0d;
  }

  .hero {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
  }

  h1 {
    text-shadow: 10px 10px 0 rgba(0,0,0,1);
    font-size: 100px;
  }
  </style>

<script>
  const hero = document.querySelector('.hero');
  const text = hero.querySelector('h1');
  const walk = 500; // 500px

  function shadow(e) {
    const { offsetWidth: width, offsetHeight: height } = hero;
    let { offsetX: x, offsetY: y } = e;

    if (this !== e.target) {
      x = x + e.target.offsetLeft;
      y = y + e.target.offsetTop;
    }

    const xWalk = Math.round((x / width * walk) - (walk / 2));
    const yWalk = Math.round((y / height * walk) - (walk / 2));

    text.style.textShadow = `
      ${xWalk}px ${yWalk}px 0 rgba(255,0,255,0.7),
      ${xWalk * -1}px ${yWalk}px 0 rgba(0,255,255,0.7),
      ${yWalk}px ${xWalk * -1}px 0 rgba(0,255,0,0.7),
      ${yWalk * -1}px ${xWalk}px 0 rgba(0,0,255,0.7)
    `;

  }

  hero.addEventListener('mousemove', shadow);

  // Custom cursor
  const cursor = document.getElementById('cursor');
  const trail  = document.getElementById('trail');
  let mx = 0, my = 0, tx = 0, ty = 0;

  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

  (function animate() {
    cursor.style.transform = `translate(${mx}px,${my}px)`;
    tx += (mx - tx) * 0.1;
    ty += (my - ty) * 0.1;
    trail.style.transform = `translate(${tx}px,${ty}px)`;
    requestAnimationFrame(animate);
  })();

  document.querySelectorAll('a, button, h1').forEach(el => {
    el.addEventListener('mouseenter', () => { cursor.classList.add('hovered'); trail.classList.add('hovered'); });
    el.addEventListener('mouseleave', () => { cursor.classList.remove('hovered'); trail.classList.remove('hovered'); });
  });
</script>
</body>
</html>
